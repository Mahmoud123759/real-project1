apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: backend-health-check
  namespace: production
spec:
  args:
    - name: service-name

  metrics:
    - name: success-rate
      interval: 1m
      count: 5
      successCondition: result[0] >= 0.95
      failureLimit: 2
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(
              alb_target_response_count{
                target_group=~".*{{args.service-name}}.*",
                response_code!~"5.."
              }[1m]
            )) /
            sum(rate(
              alb_target_response_count{
                target_group=~".*{{args.service-name}}.*"
              }[1m]
            ))

    - name: latency-p99
      interval: 1m
      count: 5
      successCondition: result[0] <= 0.3
      failureLimit: 2
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.99,
              sum(rate(
                http_request_duration_seconds_bucket{
                  service="{{args.service-name}}"
                }[1m]
              )) by (le)
            )

    - name: db-connection-errors
      interval: 1m
      count: 5
      successCondition: result[0] == 0
      failureLimit: 1
      provider:
        prometheus:
          address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(increase(
              pg_connection_errors_total{
                service="{{args.service-name}}"
              }[1m]
            ))