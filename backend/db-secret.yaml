# Plain Kubernetes Secret holding RDS PostgreSQL credentials.
#
# Given you already run Vault HA on this cluster, the commented block below
# shows the Vault Agent Injector alternative — pulling these same keys from
# Vault's KV engine at pod-start instead of a static Secret. Use whichever
# fits your current rollout maturity; swapping later just means removing
# this Secret and adding the annotations to the Rollout's pod template.

apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: production
  annotations:
    avp.kubernetes.io/path: "secret/data/argocd/postgres/rds"
type: Opaque
stringData:
  host: my-db.cmxu0m6ucumw.us-east-1.rds.amazonaws.com
  port: "5432"
  dbname: testdb
  username: <username>
  password: <password>

---
# --- Vault Agent Injector alternative (commented out) ---
#
# Instead of the Secret above, annotate the Rollout's pod template with:
#
# metadata:
#   annotations:
#     vault.hashicorp.com/agent-inject: "true"
#     vault.hashicorp.com/role: "backend-app"
#     vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/production/rds"
#     vault.hashicorp.com/agent-inject-template-db-creds: |
#       {{- with secret "secret/data/production/rds" -}}
#       export DB_HOST="{{ .Data.data.host }}"
#       export DB_PORT="{{ .Data.data.port }}"
#       export DB_NAME="{{ .Data.data.dbname }}"
#       export DB_USER="{{ .Data.data.username }}"
#       export DB_PASSWORD="{{ .Data.data.password }}"
#       {{- end -}}
#
# Then source /vault/secrets/db-creds in the container entrypoint instead
# of using secretKeyRef in rollout.yaml's env block.